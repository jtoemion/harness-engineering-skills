# Boot sequence paths (in order)
boot_sequence:
  quick:
    - "{MASTER_PROTOCOL}"
    - "{SKILLS_ROOT}\\karpathy-guidelines\\SKILL.md"
  full:
    - "{MASTER_PROTOCOL}"
    - "{SKILLS_ROOT}\\harness\\SKILL.md"
    - "{SKILLS_ROOT}\\harness\\MISTAKES.md"
    - "VAULT_MISTAKES/" # status != RESOLVED
    - "PROBE_REST_API" # enhanced vs file-only mode
    - ".session-close-staging/" # atomic close recovery
    - "{SKILLS_ROOT}\\superpowers\\memorybank\\SKILL.md"
    - ".memory\\" # loaded per memorybank Phase 1
    - "{SKILLS_ROOT}\\karpathy-guidelines\\SKILL.md"
    - "GLOBAL_VAULT" # cross-project mistakes, patterns
