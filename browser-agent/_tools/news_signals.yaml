# News Quality Filter Configuration
# Used by scrape_articles.py to filter IN/OUT articles

filter_out:
  # Trackers & Live Updates
  - tracker
  - latest goals
  - score update
  - live blog
  - running blog
  - minute-by-minute
  - live ticker

  # Non-Article Pages
  - terms and conditions
  - privacy policy
  - cookie policy
  - legal
  - sitemap
  - sign in
  - log in
  - register
  - subscribe

  # Women's Football (EXCLUDE ALL)
  - women's football
  - women's soccer
  - women's world cup
  - wsl
  - womens super league
  - nwsl
  - women's champions league
  - women's league
  - women's cup

  # Rankings & Standings
  - rankings
  - power rankings
  - standings
  - tables
  - leaderboard
  - form guide

  # Match Reports & Previews
  - vs
  - preview
  - build-up
  - talking points
  - match report
  - match analysis

  # Live & Gossip Columns
  - paper talk
  - papers
  - daily mail
  - express
  - mirror
  - telegraph
  - star
  - record

  # Team-Specific Gossip
  - efl latest
  - championship latest
  - league one latest
  - prem league latest
  - la liga latest
  - serie a latest
  - bundesliga latest
  - ligue 1 latest
  - scottish latest

  # Betting & Fantasy
  - odds
  - betting
  - betting tips
  - fantasy
  - fantasy football
  - fantasy premier league
  - fpl
  - draft

  # General Roundups
  - roundup
  - recap
  - morning digest
  - daily briefing
  - top stories
  - newspaper roundup
  - back pages

  # Video & Audio Content
  - video
  - podcast
  - watch
  - daily digest

  # Transfer Gossip - most variations
  - transfer news
  - transfer rumours
  - transfer gossip
  - transfer talk
  - transfer centre
  - transfers live
  - transfer latest

  # Predictions
  - prediction
  - predictions
  - best bets

  # Social Media Reactions
  - reaction
  - reacts to
  - social media
  - viral

