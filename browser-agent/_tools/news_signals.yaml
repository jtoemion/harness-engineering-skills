  # Managerial Changes
  - sacked
  - dismisses
  - fires
  - appoints
  - appointed
  - resigns
  - steps down
  - new manager
  - manager leaves

  # Records & Milestones
  - record
  - milestone
  - all time
  - first time in history
  - becomes
  - surpasses
  - breaks record
  - reaches milestone

  # Deaths & Tragedies
  - dies
  - passed away
  - tragically
  - in memoriam
  - obituary
  - killed
  - accident

  # Competition Results (NOT match reports)
  - wins the league
  - wins the cup
  - champions
  - qualify
  - qualified
  - eliminated
  - knocked out
  - relegated
  - promoted

  # Scandals & Discipline
  - investigation
