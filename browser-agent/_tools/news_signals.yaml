  - loss

# X.com Tweet Filters (for scrape_tweets.py)

x_filter_out:
  # Low-value tweet types
  - quote tweet
  - retweet
  - reply to
  - subscribed
  - follow for
  - turn on notifications
  - enable notifications

x_filter_in:
  # High-value tweet signals
  - breaking
  - exclusive
  - done deal
  - here we go
  - confirmed
  - sources say
  - understands
  - bid accepted
  - medical
  - agreement
  - announces

# Source Configurations

sources:
  bbc:
    url: https://www.bbc.com/sport/football
    selectors:
      - "a[href*='/sport/football/articles/']"
      - "a[href*='/sport/football/']"
    article_containers:
      - "article"
      - ".article-body"
      - ".story-body"

  sky:
    url: https://www.skysports.com/football/news
    selectors:
      - "a[href*='/football/news/'][href$='/'][not(contains(@href, 'live-blog'))]"
      - "a[href*='/football/story-telling/']"
      - "a[href*='/football/interview/']"
      - "a[href*='/football/feature/']"
      - ".news-list__link[href*='/news/']"
    article_containers:
      - ".article"
      - ".news-article"
      - ".sdc-news-article"
      - ".article-body"

  the_athletic:
    url: https://www.theathletic.com/football
    selectors:
      - "article a"
      - ".headline a"
      - "a[href*='/news/']"
    article_containers:
      - "article"
      - ".content-body"

  transfermarkt:
    url: https://www.transfermarkt.com
    selectors:
      - ".news-table a"
      - ".item a[href*='/news/']"
    article_containers:
      - "article"
      - ".main-content"

  marca:
    url: https://www.marca.com/futbol
    selectors:
      - ".titular-noticia"
      - ".container-tags a"
      - "a[href*='/noticia/']"
    article_containers:
      - "article"
      - ".articulo"

  goal:
    url: https://www.goal.com
    selectors:
      - "article a"
      - ".headline a"
      - "a[href*='/news/']"
    article_containers:
      - "article"
      - ".article-body"

  talksport:
    url: https://www.talksport.com/football
    selectors:
      - "article a"
      - ".headline a"
      - "h2 a"
      - "h3 a"
    article_containers:
      - "article"
      - ".content"