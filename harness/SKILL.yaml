skill:
  name: harness
  display_name: Harness Engineering (Full Mode Only)
  version: "1.0"
  last_updated: "2026-05-18"
  file_path: C:\Users\jtoem\.config\opencode\skills\harness\SKILL.md
  skills_root: C:\Users\jtoem\.config\opencode\skills
  category: core
  subcategory: enforcement
  tags: [harness, enforcement, state-machine, gates, subagent, session-close]
  compliance_level: strict

trigger:
  conditions:
    - condition: "harness boot | harness status | harness gate | harness checkpoint | harness close | harness mistakes"
      type: keyword
      required: true
    - condition: "FULL mode only — harness has no function in QUICK mode"
      type: context_flag
      required: false
  mode_required: full
  min_task_complexity: any
  weight: 100

behavior:
  summary: Universal harness engineering — mistake tracking, subagent routing, mandatory session close.
  detailed_description: |
    FULL MODE ONLY. QUICK MODE has no harness. Implements state machine (BOOTING → ACTIVE ↔ CHECKPOINTING → CLOSING → CLOSED),
    mandatory session close, subagent protocol with commander pattern, iterative learning layer.
    Runtime files: harness.py (CLI), state.py (Pydantic model), conductor.py (YAML routing), bridge.py (JS subprocess),
    mistakes.py, memory_watch.py, checkpoint.py, session_close.py, flow-watcher/.

  process:
    - step: 1
      action: Boot sequence — detect FULL mode, load skill-router.yaml, check .memory staleness, check MISTAKES.md, load memorybank, load karpathy
      mandatory: true
      output: Boot Status Report printed
      verification: "⚡ ONLINE output with mode/memory/harness status"
      failure_mode: ".memory missing = FULL mode cannot boot"

    - step: 2
      action: Pre-task gate — check .memory staleness, check project knowledge, route via skill-router.yaml
      mandatory: true
      output: Skill loaded + warnings printed
      verification: Gate PASS or BLOCK
      failure_mode: "BLOCK = exit(1)"

    - step: 3
      action: Task execution — agent works with subagent dispatch
      mandatory: true
      output: Task completed
      verification: Checkpoint before claiming done
      failure_mode: "Skipping checkpoint = BLOCK at pre-complete"

    - step: 4
      action: Pre-complete gate — verification_logged + checkpoint_complete required
      mandatory: true
      output: Gate PASS or BLOCK
      verification: Run verify-done before close
      failure_mode: "Missing verification_logged = BLOCK"

    - step: 5
      action: Session close — 12-step pipeline, atomic staging, git commit
      mandatory: true
      output: CLOSED state
      verification: "State = CLOSED"
      failure_mode: "Skipping close = pre-commit hook blocks commit"

  entry_conditions:
    - condition: "FULL mode — .memory/ directory exists in project root"
      check: "Path('.memory').exists() == True"
    - condition: "QUICK mode has no harness — skip all harness commands"
      check: "detect_mode() returns 'quick'"

  exit_conditions:
    - condition: "State machine reached CLOSED"
      check: "state.state == 'CLOSED'"

gates:
  - gate_id: full-mode-only
    gate_type: hard_block
    trigger: Harness commands run in QUICK mode
    message: "HARNESS IS FULL MODE ONLY. QUICK MODE has no harness."
    blocking_command: null

  - gate_id: mandatory-session-close
    gate_type: hard_block
    trigger: Agent attempts to end session without running close pipeline
    message: "HARD-GATE: Session close is mandatory in FULL mode. Run 'harness close'."
    blocking_command: "python harness.py close"

  - gate_id: no-skip-checkpoint
    gate_type: hard_block
    trigger: Agent claims task complete without running checkpoint
    message: "HARD-GATE: Run 'harness checkpoint --task \"...\"' before claiming done."
    blocking_command: "python harness.py checkpoint --task \"...\""

anti_patterns:
  - pattern: Running harness in QUICK mode
    description: QUICK mode has no harness — commands have no effect
    severity: BLOCKER
    prevention: Detect mode first — harness only exists in FULL mode
  - pattern: Skipping session close
    description: Mandatory in FULL mode — pre-commit hook blocks if state != CLOSED
    severity: BLOCKER
    prevention: Run harness close before ending session

components:
  files_read:
    - path: harness/runtime/state.py
      purpose: Pydantic state model + transitions
      min_lines: null
    - path: harness/runtime/conductor.py
      purpose: Routing engine YAML + Qwen
      min_lines: null
    - path: harness/SUBAGENT_PROTOCOL.md
      purpose: Subagent delegation rules
      min_lines: null

integration:
  calls:
    - called_skill: subagent-driven-development
      call_phase: during
      call_step: 3
      reason: Main agent must use subagent dispatch for all implementation

quick_ref:
  trigger_line: "Fires on any 'harness' CLI command — boot, gate, checkpoint, close, status, mistakes"
  key_constraint: "FULL MODE ONLY — QUICK mode has no harness"
  command_sequence: "boot → gate(pre-task) → work → checkpoint → gate(pre-complete) → close"
  output_indicator: "After: state = CLOSED, all memory synced, git commit done"