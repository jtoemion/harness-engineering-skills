skill:
  name: test-review
  display_name: Test Quality Review
  version: "1.0"
  last_updated: "2026-05-18"
  file_path: C:\Users\jtoem\.config\opencode\skills\harness\test-review\SKILL.md
  skills_root: C:\Users\jtoem\.config\opencode\skills
  category: quality
  subcategory: testing
  tags: [testing, quality, review, determinism, isolation, maintainability]
  compliance_level: flexible

trigger:
  conditions:
    - condition: "review tests | evaluate test quality | test review | test quality"
      type: keyword
      required: true
  mode_required: any
  min_task_complexity: moderate
  weight: 90
  disambiguation_rule: |
    test-review = "Are my EXISTING tests good quality?" (review/audit)
    test-driven-development = "Am I WRITING new code? Write tests first!" (process)
    e2e-scaffold = "Do I need E2E test INFRASTRUCTURE setup?" (scaffolding)

behavior:
  summary: Review test suites for structural quality, reliability, and maintainability across 4 dimensions.
  detailed_description: |
    Evaluates test quality across 4 dimensions: Determinism (30%), Isolation (30%), Maintainability (25%),
    Performance (15%). Process: Discovery → Analysis → Scoring → Report. Produces structured findings
    with dimension scores and improvement recommendations. Works with ANY project — no assumptions
    about domain or framework.

  process:
    - step: 1
      action: Discovery — Find test files, identify framework, count tests
      mandatory: true
      output: List of test files + framework identified
      verification: Framework confirmed
      failure_mode: Wrong framework = wrong evaluation criteria

    - step: 2
      action: Analysis — Evaluate each test against 4 dimensions
      mandatory: true
      output: Per-test dimension scores
      verification: All tests evaluated
      failure_mode: Skipping dimension = incomplete review

    - step: 3
      action: Scoring — Rate each dimension 0-100, calculate weighted overall score
      mandatory: true
      output: Dimension scores + overall quality score
      verification: Scores sum correctly
      failure_mode: Subjective scoring without criteria = unreliable

    - step: 4
      action: Report — Generate structured findings using FINDINGS_TEMPLATE.md
      mandatory: true
      output: Structured findings report
      verification: Report has all required sections
      failure_mode: Report without file:line references = no actionable findings

  entry_conditions:
    - condition: "Test files exist in project"
      check: "Test directory found (tests/, __tests__/, etc.)"

  exit_conditions:
    - condition: "Structured findings report delivered"
      check: "Report has dimension scores + specific findings + recommendations"

gates:
  - gate_id: no-file-references
    gate_type: warning
    trigger: Report lacks file:line references for findings
    message: "Findings without file:line refs are not actionable. Add specific locations."
    blocking_command: null

anti_patterns:
  - pattern: Scoring based on gut feel rather than observable criteria
    description: Dimension scores must be based on explicit criteria, not intuition
    severity: MAJOR
    prevention: Use REVIEW_DIMENSIONS.md criteria for each dimension

components:
  files_read:
    - path: harness/test-review/REVIEW_DIMENSIONS.md
      purpose: Evaluation criteria for each dimension
      min_lines: null
    - path: harness/test-review/REVIEW_PROCESS.md
      purpose: Step-by-step review process
      min_lines: null
    - path: harness/test-review/FINDINGS_TEMPLATE.md
      purpose: Report output structure
      min_lines: null

quick_ref:
  trigger_line: "Fires on 'review tests', 'evaluate test quality', 'test review', 'test quality'"
  key_constraint: "4-dimension scoring: Determinism 30%, Isolation 30%, Maintainability 25%, Performance 15%"
  command_sequence: "Discovery → Analysis → Scoring → Report"
  output_indicator: "After: Structured findings report with dimension scores + recommendations"