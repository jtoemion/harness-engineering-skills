# Skill Router — Single Source of Truth
# Agent reads THIS FILE ONLY to decide which skill to load.
# Never browse skill folders — route through this file first.
# FIRST MATCH on condition wins. Higher weight = higher priority on ties.

version: "2.0"
updated: "2026-04-26"

skills_root: "C:\\Users\\jtoem\\.config\\opencode\\skills"

# ROUTING TABLE — evaluated top-to-bottom, first match wins
