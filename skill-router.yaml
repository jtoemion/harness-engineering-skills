# DISAMBIGUATION — handle commonly confused skills
disambiguation:
  - confused:
      - test-review
      - test-driven-development
      - e2e-scaffold
    rule: |
      test-review = "Are my EXISTING tests good quality?" (review/audit)
      test-driven-development = "Am I WRITING new code? Write tests first!" (process)
      e2e-scaffold = "Do I need E2E test INFRASTRUCTURE setup?" (scaffolding)

  - confused:
      - document-project
      - project-context
    rule: |
      document-project = Full documentation generator (3 scan modes, produces architecture docs, dev guides, etc.)
      project-context = Lightweight persistent rules file (~100 lines, gotchas + patterns for AI)

  - confused:
      - workflow-builder
      - writing-skills
      - conductor
    rule: |
      workflow-builder = Design, analyze, or convert workflow SKILL structures (outcome-driven design)
      writing-skills = TDD process for creating individual skills (test with subagent, write, verify)
      conductor = Route complex multi-skill requests to the right sub-skill orchestration

  - confused:
      - requesting-code-review
      - receiving-code-review
    rule: |
      requesting = You COMPLETED work, want review before merging
      receiving = You RECEIVED feedback, deciding what to implement

  - confused:
      - systematic-debugging
      - test-driven-development
    rule: |
      systematic-debugging = Something is BROKEN (bug, failure, unexpected behavior) — find root cause
      test-driven-development = You're BUILDING something new (feature, bugfix) — write tests first

  - confused:
      - writing-plans
      - executing-plans
    rule: |
      writing-plans = Have requirements, need a plan BEFORE coding
      executing-plans = Have a written plan, need to IMPLEMENT it

# MODE GUARDS — skills that require specific modes
mode_guards:
  - skill_id: "session-close"
    requires: "full"
    fallback: "Acknowledge request. List what was done. Cannot run full session close in QUICK mode."

  - skill_id: "cold-start"
    requires: "full"
    fallback: "COLD START requires FULL mode. Create .memory/ directory first."

# ANTI-RATIONALIZATION — prevent common wrong routing decisions
routing_rules:
  - rule: "NEVER load a skill based on keyword match alone. Check the condition AND context."
  - rule: "When multiple skills could apply, use weight to resolve. If weights are equal, use disambiguation table."
  - rule: "QUICK mode skills must not depend on .memory/ or harness state."
  - rule: "If no routing condition matches, proceed without loading any skill. Do NOT guess."
  - rule: "karpathy-guidelines loads on boot in both modes. Do not load it again via routing."
  - rule: "dev-journey-log and scope-guard fire AUTOMATICALLY on their trigger conditions. No user request needed."